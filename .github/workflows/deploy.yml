name: Deploy to GitHub Pages

on:
  push:
    branches: [main, "claude/*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Always checkout main (the only branch allowed to deploy to Pages).
      # If this run was triggered by a claude/* branch, merge it in so
      # the built artifact contains those changes.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Merge claude branch into main (CI only)
        if: startsWith(github.ref, 'refs/heads/claude/')
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI"
          git fetch origin ${{ github.ref_name }}
          git merge --ff-only origin/${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_JSONBIN_API_KEY: ${{ secrets.VITE_JSONBIN_API_KEY }}
          VITE_JSONBIN_BIN_ID: ${{ secrets.VITE_JSONBIN_BIN_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
